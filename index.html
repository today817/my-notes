<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的笔记</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
  <!-- 顶部工具栏 -->
  <div class="top-bar">
    <div class="top-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <h1>个人笔记系统</h1>
    </div>
    <div class="top-right">
      <input type="text" id="search" placeholder="搜索内容输入" class="search-input">
      <input type="date" id="dateFilter" placeholder="选择日期" class="date-input">
      <select id="categoryFilter" class="category-select">
        <option value="">选择分类</option>
      </select>
      <input type="color" id="themeColor" value="#2196F3" class="theme-picker">
    </div>
  </div>

  <!-- 左侧可折叠侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>分类列表</h3>
    </div>
    <div class="sidebar-content">
      <div class="category-item active" data-category="">
        <span class="category-icon">📋</span>
        <span class="category-name">全部笔记</span>
        <span class="category-count" id="total-count">0</span>
      </div>
      <div class="category-item" data-category="工作">
        <span class="category-icon">💼</span>
        <span class="category-name">工作</span>
        <span class="category-count" id="work-count">0</span>
      </div>
      <div class="category-item" data-category="生活">
        <span class="category-icon">🏠</span>
        <span class="category-name">生活</span>
        <span class="category-count" id="life-count">0</span>
      </div>
      <div class="category-item" data-category="学习">
        <span class="category-icon">📚</span>
        <span class="category-name">学习</span>
        <span class="category-count" id="study-count">0</span>
      </div>

    </div>
  </div>

  <!-- 主内容区域 -->
  <div class="main-content" id="mainContent">
    <div class="content-header">
      <h2 id="current-category-title">全部笔记</h2>
    </div>
    <div class="notes-grid" id="notesList"></div>
  </div>

  <!-- 悬浮新增按钮 -->
  <button class="floating-add-btn" onclick="showAddDialog()">+</button>
  


  <!-- 新增/编辑笔记对话框 -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">新增笔记</h3>
        <span class="close" onclick="closeAddDialog()">&times;</span>
      </div>
      <div class="modal-body">
        <input type="text" id="title" placeholder="笔记标题" class="form-input">
        <textarea id="content" placeholder="笔记内容" class="form-textarea"></textarea>
        <select id="noteCategory" class="form-select">
          <option value="工作">工作</option>
          <option value="生活">生活</option>
          <option value="学习">学习</option>
        </select>
        <input type="file" id="imgUpload" accept="image/*" class="form-file">
      </div>
      <div class="modal-footer">
        <button onclick="closeAddDialog()" class="btn-cancel">取消</button>
        <button onclick="saveNote()" class="btn-save">保存</button>
      </div>
    </div>
  </div>

  <!-- 笔记详情对话框 -->
  <div class="modal" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="detail-title">笔记详情</h3>
        <span class="close" onclick="closeDetailDialog()">&times;</span>
      </div>
      <div class="modal-body" id="noteDetail">
      </div>
      <div class="modal-footer">
        <button onclick="closeDetailDialog()" class="btn-cancel">关闭</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
